<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主子的学习管理平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #F8FAFC 0%, #F1F5F9 50%, #EDE9FE 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(124, 58, 237, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(124, 58, 237, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        .coze-header {
            position: fixed;
            top: 24px;
            left: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
        }

        .coze-logo {
            width: 40px;
            height: 45px;
        }

        .coze-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .coze-text {
            font-size: 20px;
            font-weight: 600;
            color: #1E293B;
        }

        .login-container {
            width: 360px;
            background: white;
            border-radius: 16px;
            padding: 40px 36px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            position: relative;
            z-index: 10;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 48px;
            height: 54px;
            margin: 0 auto 16px;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .platform-name {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 24px;
            font-weight: 600;
            color: #1E293B;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #64748B;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            height: 44px;
            padding: 0 14px;
            border: 1px solid #E2E8F0;
            border-radius: 10px;
            font-size: 14px;
            color: #1E293B;
            transition: all 0.2s;
            outline: none;
            font-family: inherit;
        }

        .form-group input:focus {
            border-color: #7C3AED;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .form-group input::placeholder {
            color: #94A3B8;
        }

        .login-btn {
            width: 100%;
            height: 46px;
            background: linear-gradient(135deg, #7C3AED 0%, #8B5CF6 100%);
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
            font-family: inherit;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #E2E8F0;
        }

        .divider-text {
            padding: 0 16px;
            font-size: 12px;
            color: #94A3B8;
        }

        .wechat-btn {
            width: 100%;
            height: 46px;
            background: #07C160;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }

        .wechat-btn:hover {
            background: #06AD56;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(7, 193, 96, 0.3);
        }

        .wechat-btn svg {
            width: 20px;
            height: 20px;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #94A3B8;
        }

        /* 微信登录弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
            visibility: visible;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 32px;
            width: 320px;
            text-align: center;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 24px;
            height: 24px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 20px;
            color: #94A3B8;
        }

        .modal-close:hover {
            color: #1E293B;
        }

        .qr-placeholder {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #F1F5F9 0%, #E2E8F0 100%);
            border-radius: 12px;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #64748B;
            font-size: 14px;
            border: 2px dashed #CBD5E1;
        }

        .qr-placeholder-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .modal-tip {
            font-size: 13px;
            color: #64748B;
            margin-top: 16px;
        }

        /* 手机端适配 */
        @media (max-width: 768px) {
            body {
                padding: 24px;
                padding-top: 80px;
            }

            .coze-header {
                top: 20px;
                left: 20px;
            }

            .coze-logo {
                width: 32px;
                height: 36px;
            }

            .coze-text {
                font-size: 17px;
            }

            .login-container {
                width: 100%;
                max-width: 320px;
                padding: 36px 28px;
            }

            .logo-icon {
                width: 44px;
                height: 50px;
            }

            .platform-name {
                font-size: 22px;
            }

            .form-group input {
                height: 48px;
                font-size: 15px;
            }

            .login-btn, .wechat-btn {
                height: 50px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- 左上角扣子Logo -->
    <div class="coze-header">
        <div class="coze-logo">
            <img src="assets/coze-logo.svg" alt="扣子">
        </div>
        <span class="coze-text">扣子</span>
    </div>

    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">
                <img src="assets/coze-logo.svg" alt="扣子">
            </div>
            <div class="platform-name">主子的学习管理平台</div>
        </div>

        <div class="form-group">
            <label>扣子账号</label>
            <input type="text" id="username" placeholder="请输入手机号/邮箱">
        </div>

        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>

        <button class="login-btn" id="loginBtn">登录</button>

        <div class="footer-text">
            仅限授权用户使用
        </div>
    </div>

    <!-- 主应用容器 (SPA) -->
    <div id="app-container" style="display: none;"></div>

    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var loginBtn = document.getElementById('loginBtn');
            var usernameInput = document.getElementById('username');
            var passwordInput = document.getElementById('password');
            
            // 检查是否已登录，如果已登录直接跳转到首页
            if (Storage.isLoggedIn()) {
                showApp();
                return;
            }

            // 扣子账号登录
            loginBtn.addEventListener('click', function() {
                var username = usernameInput.value.trim();
                var password = passwordInput.value.trim();

                if (!username) {
                    showToast('请输入账号');
                    usernameInput.focus();
                    return;
                }
                if (!password) {
                    showToast('请输入密码');
                    passwordInput.focus();
                    return;
                }

                // 模拟登录成功
                Storage.login(username);
                showToast('登录成功！');
                
                // 显示SPA应用
                setTimeout(function() {
                    showApp();
                }, 500);
            });

            // 回车登录
            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    loginBtn.click();
                }
            });
            
            // 显示SPA应用
            function showApp() {
                document.body.innerHTML = '';
                document.body.style.background = '#F8FAFC';
                
                var appContainer = document.createElement('div');
                appContainer.id = 'app-container';
                appContainer.className = 'app-container';
                document.body.appendChild(appContainer);
                
                // 初始化路由
                Router.init();
                
                // 监听路由变化，更新页面内容
                var isInitializing = true;
                window.addEventListener('hashchange', function() {
                    if (isInitializing) return; // 初始化期间忽略
                    var hash = window.location.hash.slice(1) || 'home';
                    if (hash === 'index') {
                        // 登出
                        Storage.logout();
                        window.location.reload();
                    }
                });
                // 初始化完成后允许处理
                setTimeout(function() { isInitializing = false; }, 100);
            }
            
            // Toast提示
            function showToast(message) {
                var toast = document.createElement('div');
                toast.style.cssText = 'position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1E293B; color: white; padding: 12px 24px; border-radius: 10px; font-size: 14px; z-index: 2000; animation: fadeIn 0.3s ease;';
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(function() {
                    toast.style.animation = 'fadeOut 0.3s ease forwards';
                    setTimeout(function() {
                        toast.remove();
                    }, 300);
                }, 2000);
            }
            
            // 添加fadeOut动画
            var style = document.createElement('style');
            style.textContent = '@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }';
            document.head.appendChild(style);
        });
    </script>
</body>
</html>
