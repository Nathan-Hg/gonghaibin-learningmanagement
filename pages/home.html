<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 主子的学习管理平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="app-header">
            <div class="header-left">
                <img src="../assets/coze-logo.svg" alt="扣子" style="width: 32px; height: 36px;">
                <span class="header-title">首页</span>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">U</div>
                </div>
            </div>
        </header>

        <!-- 移动端底部导航 -->
        <nav class="bottom-nav">
            <a class="nav-item active" href="#home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>首页</span>
            </a>
            <a class="nav-item" href="#record">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>录入</span>
            </a>
            <a class="nav-item" href="#calendar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <span>日历</span>
            </a>
            <a class="nav-item" href="#task">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <span>任务</span>
            </a>
            <a class="nav-item" href="#archive">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                <span>档案</span>
            </a>
        </nav>

        <!-- PC端侧边导航 -->
        <nav class="sidebar-nav">
            <a class="nav-item active" href="#home">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                </svg>
                首页
            </a>
            <a class="nav-item" href="#record">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                录入
            </a>
            <a class="nav-item" href="#calendar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                日历
            </a>
            <a class="nav-item" href="#task">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                任务
            </a>
            <a class="nav-item" href="#exam">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                </svg>
                答题
            </a>
            <a class="nav-item" href="#archive">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                学习档案
            </a>
            <a class="nav-item" href="#knowledge">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                知识库
            </a>
            <a class="nav-item" href="#stats">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
                统计
            </a>
        </nav>

        <!-- 主内容区 -->
        <main class="app-main">
            <div class="page-header">
                <div class="page-title" id="greeting">你好</div>
                <div class="page-subtitle" id="date-info">正在加载...</div>
            </div>

            <!-- 日历组件 -->
            <div class="calendar mb-6" id="home-calendar">
                <div class="calendar-header">
                    <div class="calendar-title" id="calendar-title">加载中...</div>
                    <div class="calendar-nav">
                        <button onclick="App.prevMonth()">‹</button>
                        <button onclick="App.nextMonth()">›</button>
                    </div>
                </div>
                <div class="calendar-weekdays">
                    <div class="calendar-weekday">日</div>
                    <div class="calendar-weekday">一</div>
                    <div class="calendar-weekday">二</div>
                    <div class="calendar-weekday">三</div>
                    <div class="calendar-weekday">四</div>
                    <div class="calendar-weekday">五</div>
                    <div class="calendar-weekday">六</div>
                </div>
                <div class="calendar-days" id="calendar-days"></div>
            </div>

            <!-- 今日任务提醒 -->
            <div class="card mb-6" id="today-tasks">
                <div class="card-header">
                    <div class="card-title">📌 今日任务</div>
                    <span class="card-badge" id="task-count">0</span>
                </div>
                <div id="task-list-preview">
                    <div class="text-muted text-center" style="padding: 20px;">暂无待完成任务</div>
                </div>
            </div>

            <!-- 功能入口 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">快捷入口</div>
                </div>
                <div class="quick-actions">
                    <div class="quick-action" onclick="Router.go('record')">
                        <div class="quick-action-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </div>
                        <div class="quick-action-label">录入</div>
                    </div>
                    <div class="quick-action" onclick="Router.go('exam')">
                        <div class="quick-action-icon" style="background: rgba(16,185,129,0.1);">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                        </div>
                        <div class="quick-action-label">答题</div>
                    </div>
                    <div class="quick-action" onclick="Router.go('task')">
                        <div class="quick-action-icon" style="background: rgba(245,158,11,0.1);">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                        </div>
                        <div class="quick-action-label">任务</div>
                    </div>
                    <div class="quick-action" onclick="Router.go('archive')">
                        <div class="quick-action-icon" style="background: rgba(59,130,246,0.1);">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                            </svg>
                        </div>
                        <div class="quick-action-label">档案</div>
                    </div>
                    <div class="quick-action" onclick="Router.go('knowledge')">
                        <div class="quick-action-icon" style="background: rgba(236,72,153,0.1);">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#EC4899" stroke-width="2">
                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                            </svg>
                        </div>
                        <div class="quick-action-label">知识库</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/router.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态
            if (!Storage.isLoggedIn()) {
                window.location.hash = '';
                window.location.href = '../index.html';
                return;
            }
            
            // 更新问候语
            const user = Storage.getCurrentUser();
            document.getElementById('greeting').textContent = '你好，' + user.username;
            document.getElementById('user-avatar').textContent = Utils.getUserInitial(user.username);
            
            // 更新日期信息
            const now = new Date();
            const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            document.getElementById('date-info').textContent = 
                (now.getMonth() + 1) + '月' + now.getDate() + '日 ' + weekDays[now.getDay()] + ' · 每天进步一点点';
            
            // 渲染日历
            App.renderCalendar();
        });
    </script>
</body>
</html>
