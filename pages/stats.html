<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计 - 主子的学习管理平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <button class="back-btn" onclick="Router.go('home')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <img src="../assets/coze-logo.svg" alt="扣子" style="width: 32px; height: 36px;">
                <span class="header-title">学习统计</span>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <div class="user-avatar">U</div>
                </div>
            </div>
        </header>

        <nav class="bottom-nav">
            <a class="nav-item" href="#home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                </svg>
                <span>首页</span>
            </a>
            <a class="nav-item" href="#record">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>录入</span>
            </a>
            <a class="nav-item" href="#calendar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                </svg>
                <span>日历</span>
            </a>
            <a class="nav-item" href="#task">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                </svg>
                <span>任务</span>
            </a>
            <a class="nav-item" href="#archive">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                <span>档案</span>
            </a>
        </nav>

        <main class="app-main">
            <div class="page-header">
                <div class="page-title">学习统计</div>
                <div class="page-subtitle">数据驱动，持续进步</div>
            </div>

            <!-- 总体统计 -->
            <div class="stats-grid mb-6">
                <div class="stat-card">
                    <div class="stat-value" id="stat-hours">128</div>
                    <div class="stat-label">总学习时长（小时）</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-contents">35</div>
                    <div class="stat-label">学习内容数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-rate">78%</div>
                    <div class="stat-label">考核完成率</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-mastery">7.5</div>
                    <div class="stat-label">平均掌握度</div>
                </div>
            </div>

            <!-- 本周趋势 -->
            <div class="card mb-4">
                <div class="card-header">
                    <div class="card-title">本周学习趋势</div>
                    <span class="tag tag-primary">同比 +15%</span>
                </div>
                <div style="padding: 10px 0;">
                    <div style="display: flex; align-items: flex-end; justify-content: space-between; height: 100px; gap: 8px;">
                        <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                            <div style="width: 100%; background: linear-gradient(to top, #7C3AED, #8B5CF6); border-radius: 4px 4px 0 0; height: 65px;"></div>
                            <span style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">周一</span>
                        </div>
                        <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                            <div style="width: 100%; background: linear-gradient(to top, #7C3AED, #8B5CF6); border-radius: 4px 4px 0 0; height: 80px;"></div>
                            <span style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">周二</span>
                        </div>
                        <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                            <div style="width: 100%; background: linear-gradient(to top, #7C3AED, #8B5CF6); border-radius: 4px 4px 0 0; height: 45px;"></div>
                            <span style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">周三</span>
                        </div>
                        <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                            <div style="width: 100%; background: linear-gradient(to top, #7C3AED, #8B5CF6); border-radius: 4px 4px 0 0; height: 90px;"></div>
                            <span style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">周四</span>
                        </div>
                        <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                            <div style="width: 100%; background: linear-gradient(to top, #7C3AED, #8B5CF6); border-radius: 4px 4px 0 0; height: 70px;"></div>
                            <span style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">周五</span>
                        </div>
                        <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                            <div style="width: 100%; background: linear-gradient(to top, #7C3AED, #8B5CF6); border-radius: 4px 4px 0 0; height: 55px;"></div>
                            <span style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">周六</span>
                        </div>
                        <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                            <div style="width: 100%; background: linear-gradient(to top, #7C3AED, #8B5CF6); border-radius: 4px 4px 0 0; height: 30px;"></div>
                            <span style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">周日</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 学习内容分布 -->
            <div class="card mb-4">
                <div class="card-header">
                    <div class="card-title">学习内容分布</div>
                </div>
                <div class="mb-4">
                    <div class="flex items-center justify-between mb-2">
                        <span class="tag tag-primary">📚 图书</span>
                        <span class="font-medium">45%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 45%;"></div>
                    </div>
                </div>
                <div class="mb-4">
                    <div class="flex items-center justify-between mb-2">
                        <span class="tag tag-success">🎬 视频</span>
                        <span class="font-medium">35%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 35%; background: var(--success);"></div>
                    </div>
                </div>
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <span class="tag tag-info">🎧 音频文稿</span>
                        <span class="font-medium">20%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 20%; background: #3B82F6;"></div>
                    </div>
                </div>
            </div>

            <!-- 掌握度趋势 -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">掌握度趋势</div>
                    <span class="tag tag-success">↑ 提升中</span>
                </div>
                <div class="mt-4">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="text-center">
                            <div class="text-purple font-bold" style="font-size: 24px;">7.5</div>
                            <div class="text-muted" style="font-size: 12px;">当前</div>
                        </div>
                        <div class="flex-1">
                            <div class="progress-bar" style="height: 12px;">
                                <div class="progress-fill" style="width: 75%;"></div>
                            </div>
                        </div>
                        <div class="text-center">
                            <div class="text-success font-bold" style="font-size: 24px;">10</div>
                            <div class="text-muted" style="font-size: 12px;">目标</div>
                        </div>
                    </div>
                    <div class="text-muted text-center" style="font-size: 13px;">
                        还需提升 2.5 分即可达到目标，继续加油！
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/router.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
