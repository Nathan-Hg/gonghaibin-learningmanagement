<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>录入 - 主子的学习管理平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="app-header">
            <div class="header-left">
                <button class="back-btn" onclick="Router.go('home')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <img src="../assets/coze-logo.svg" alt="扣子" style="width: 32px; height: 36px;">
                <span class="header-title">录入学习</span>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <div class="user-avatar">U</div>
                </div>
            </div>
        </header>

        <!-- 移动端底部导航 -->
        <nav class="bottom-nav">
            <a class="nav-item" href="#home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                </svg>
                <span>首页</span>
            </a>
            <a class="nav-item active" href="#record">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>录入</span>
            </a>
            <a class="nav-item" href="#calendar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                </svg>
                <span>日历</span>
            </a>
            <a class="nav-item" href="#task">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                </svg>
                <span>任务</span>
            </a>
            <a class="nav-item" href="#archive">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                <span>档案</span>
            </a>
        </nav>

        <!-- 主内容区 -->
        <main class="app-main">
            <div class="page-header">
                <div class="page-title">录入学习</div>
                <div class="page-subtitle">记录今天的学习内容</div>
            </div>

            <!-- 录入方式切换 -->
            <div class="tabs mb-4">
                <button class="tab active" data-tab="manual">手动录入</button>
                <button class="tab" data-tab="voice">语音录入</button>
            </div>

            <!-- 手动录入表单 -->
            <div id="manual-form">
                <div class="card">
                    <div class="form-item">
                        <label class="form-label">学习类型</label>
                        <select class="form-input form-select" id="record-type">
                            <option value="图书">📚 图书</option>
                            <option value="视频">🎬 视频</option>
                            <option value="音频文稿">🎧 音频文稿</option>
                        </select>
                    </div>

                    <div class="form-item">
                        <label class="form-label">内容名称</label>
                        <input type="text" class="form-input" id="content-name" placeholder="请输入书名或课程名">
                    </div>

                    <div class="form-item">
                        <label class="form-label">内容描述</label>
                        <textarea class="form-input form-textarea" id="content-desc" placeholder="请输入学习章节或内容摘要"></textarea>
                    </div>

                    <div class="form-item">
                        <label class="form-label">学习时长（分钟）</label>
                        <input type="number" class="form-input" id="duration" placeholder="请输入学习时长" min="1">
                    </div>

                    <button class="btn btn-primary btn-lg" style="width: 100%;" onclick="submitRecord()">
                        提交记录
                    </button>
                </div>
            </div>

            <!-- 语音录入 -->
            <div id="voice-form" style="display: none;">
                <div class="card text-center">
                    <div class="mb-6">
                        <button class="record-btn" id="record-btn" onclick="toggleRecording()">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"></path>
                                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="text-muted mb-4" id="record-status">点击开始录音</div>
                    <div class="text-muted" id="record-tip" style="font-size: 13px;">
                        录音将自动转文字并由AI解析拆分
                    </div>

                    <!-- 转写结果预览 -->
                    <div id="transcript-result" class="mt-6" style="display: none;">
                        <div class="card" style="text-align: left; background: var(--bg-secondary);">
                            <div class="font-medium mb-2">转写结果</div>
                            <div id="transcript-text" style="font-size: 14px; color: var(--text-secondary);"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 历史记录 -->
            <div class="card mt-6">
                <div class="card-header">
                    <div class="card-title">今日录入</div>
                </div>
                <div id="today-records">
                    <div class="text-muted text-center" style="padding: 20px;">暂无记录</div>
                </div>
            </div>
            <!-- 预览弹窗 -->
            <div id="preview-modal" class="modal-overlay" style="display: none;">
                <div class="modal-content" style="max-width: 400px;">
                    <h3 style="margin-bottom: 16px; color: #1E293B;">📝 录入预览</h3>
                    <div id="preview-content" class="card" style="text-align: left; background: var(--bg-secondary); margin-bottom: 16px;">
                        <!-- 预览内容将在这里显示 -->
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <button class="btn btn-secondary" style="flex: 1;" onclick="editRecord()">修改</button>
                        <button class="btn btn-primary" style="flex: 1;" onclick="confirmRecord()">确认</button>
                    </div>
                </div>
            </div>
            
            <!-- 编辑弹窗 -->
            <div id="edit-modal" class="modal-overlay" style="display: none;">
                <div class="modal-content" style="max-width: 400px;">
                    <h3 style="margin-bottom: 16px; color: #1E293B;">✏️ 修改内容</h3>
                    <div class="form-item">
                        <label class="form-label">学习类型</label>
                        <select class="form-input form-select" id="edit-type">
                            <option value="图书">📚 图书</option>
                            <option value="视频">🎬 视频</option>
                            <option value="音频文稿">🎧 音频文稿</option>
                        </select>
                    </div>
                    <div class="form-item">
                        <label class="form-label">内容名称</label>
                        <input type="text" class="form-input" id="edit-name" placeholder="请输入书名或课程名">
                    </div>
                    <div class="form-item">
                        <label class="form-label">内容描述</label>
                        <textarea class="form-input form-textarea" id="edit-desc" placeholder="请输入学习章节或内容摘要"></textarea>
                    </div>
                    <div class="form-item">
                        <label class="form-label">学习时长（分钟）</label>
                        <input type="number" class="form-input" id="edit-duration" min="1">
                    </div>
                    <div style="display: flex; gap: 12px; margin-top: 16px;">
                        <button class="btn btn-secondary" style="flex: 1;" onclick="cancelEdit()">取消</button>
                        <button class="btn btn-primary" style="flex: 1;" onclick="saveEdit()">保存</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/router.js"></script>
    <script src="../js/app.js"></script>
    <script>
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];

        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态
            if (!Storage.isLoggedIn()) {
                window.location.href = '../index.html';
                return;
            }
            
            // Tab切换
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    
                    const tabName = this.dataset.tab;
                    if (tabName === 'manual') {
                        document.getElementById('manual-form').style.display = 'block';
                        document.getElementById('voice-form').style.display = 'none';
                    } else {
                        document.getElementById('manual-form').style.display = 'none';
                        document.getElementById('voice-form').style.display = 'block';
                    }
                });
            });

            // 加载今日记录
            loadTodayRecords();
        });

        let pendingRecord = null; // 待确认的记录

        async function submitRecord() {
            const type = document.getElementById('record-type').value;
            const name = document.getElementById('content-name').value.trim();
            const desc = document.getElementById('content-desc').value.trim();
            const duration = parseInt(document.getElementById('duration').value) || 0;

            if (!name) {
                Utils.showToast('请输入内容名称', 'error');
                return;
            }
            if (!duration || duration <= 0) {
                Utils.showToast('请输入有效的学习时长', 'error');
                return;
            }

            // 准备记录数据
            pendingRecord = {
                type,
                content_name: name,
                content_desc: desc || '',
                duration
            };

            // 显示预览确认弹窗
            showConfirmPreview(pendingRecord);
        }

        function showConfirmPreview(record) {
            const overlay = document.createElement('div');
            overlay.className = 'confirm-modal-overlay';
            overlay.innerHTML = `
                <div class="confirm-modal" style="max-width: 400px;">
                    <div class="confirm-title">确认保存</div>
                    <div class="confirm-message" style="text-align: left; padding: 16px; background: var(--bg-secondary); border-radius: 8px; margin: 16px 0;">
                        <div style="margin-bottom: 8px;"><strong>类型：</strong>${record.type === '图书' ? '📚' : record.type === '视频' ? '🎬' : '🎧'} ${record.type}</div>
                        <div style="margin-bottom: 8px;"><strong>名称：</strong>${record.content_name}</div>
                        <div style="margin-bottom: 8px;"><strong>描述：</strong>${record.content_desc || '无'}</div>
                        <div><strong>时长：</strong>${record.duration}分钟</div>
                    </div>
                    <div class="confirm-buttons">
                        <button class="btn confirm-btn-cancel" onclick="cancelPreview()">返回修改</button>
                        <button class="btn confirm-btn-confirm" onclick="confirmSave()">确认保存</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(overlay);
            setTimeout(() => overlay.classList.add('show'), 10);
            
            // 点击遮罩关闭
            overlay.onclick = (e) => { if (e.target === overlay) cancelPreview(); };
        }

        function cancelPreview() {
            document.querySelector('.confirm-modal-overlay')?.remove();
            pendingRecord = null;
        }

        async function confirmSave() {
            if (!pendingRecord) return;
            
            const today = Utils.getToday();
            await Storage.saveRecord(today, pendingRecord);

            // 清除表单
            document.getElementById('content-name').value = '';
            document.getElementById('content-desc').value = '';
            document.getElementById('duration').value = '';

            // 关闭弹窗
            document.querySelector('.confirm-modal-overlay')?.remove();
            pendingRecord = null;

            Utils.showToast('✅ 已保存', 'success');
            loadTodayRecords();
        }

        async function loadTodayRecords() {
            const today = Utils.getToday();
            const data = await Storage.getRecord(today);
            const records = data.records || [];
            
            const container = document.getElementById('today-records');
            
            if (records.length === 0) {
                container.innerHTML = '<div class="text-muted text-center" style="padding: 20px;">暂无记录</div>';
                return;
            }

            container.innerHTML = records.map(rec => `
                <div class="list-item" style="cursor: default;">
                    <div class="list-item-icon">
                        ${rec.type === '图书' ? '📚' : rec.type === '视频' ? '🎬' : '🎧'}
                    </div>
                    <div class="list-item-content">
                        <div class="list-item-title">${rec.content_name}</div>
                        <div class="list-item-desc">${rec.content_desc || '无描述'} · ${rec.duration}分钟</div>
                    </div>
                </div>
            `).join('');
        }

        async function toggleRecording() {
            const btn = document.getElementById('record-btn');
            const status = document.getElementById('record-status');

            if (!isRecording) {
                // 开始录音
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (e) => {
                        audioChunks.push(e.data);
                    };

                    mediaRecorder.onstop = async () => {
                        stream.getTracks().forEach(track => track.stop());
                        await processRecording();
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    btn.classList.add('recording');
                    status.textContent = '正在录音...';
                } catch (err) {
                    console.error('录音失败:', err);
                    Utils.showToast('无法访问麦克风，请检查权限设置', 'error');
                }
            } else {
                // 停止录音
                mediaRecorder.stop();
                isRecording = false;
                btn.classList.remove('recording');
                status.textContent = '处理中...';
            }
        }

        async function processRecording() {
            const status = document.getElementById('record-status');
            const result = document.getElementById('transcript-result');
            const text = document.getElementById('transcript-text');

            // 模拟AI转写和解析
            await new Promise(resolve => setTimeout(resolve, 1500));

            // 模拟转写结果
            const mockTranscript = `今天学习了《认知觉醒》第三章元认知部分。主要内容包括：1. 元认知是对自己思考过程的认知和理解；2. 通过元认知可以及时修正错误思维；3. 每天冥想练习可以提升元认知能力。学习时长约45分钟。`;

            status.textContent = '转写完成';
            text.textContent = mockTranscript;
            result.style.display = 'block';

            // 模拟解析拆分
            await new Promise(resolve => setTimeout(resolve, 1000));

            // 准备待确认的记录
            pendingRecord = {
                type: '图书',
                content_name: '认知觉醒',
                content_desc: '第三章：元认知',
                duration: 45
            };

            // 显示预览确认弹窗
            showVoicePreview(mockTranscript, pendingRecord);
        }

        function showVoicePreview(transcript, record) {
            const overlay = document.createElement('div');
            overlay.className = 'confirm-modal-overlay';
            overlay.innerHTML = `
                <div class="confirm-modal" style="max-width: 450px;">
                    <div class="confirm-title">语音转写结果</div>
                    <div class="confirm-message" style="text-align: left;">
                        <div style="padding: 12px; background: var(--bg-secondary); border-radius: 8px; margin-bottom: 12px;">
                            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">📝 转写原文</div>
                            <div style="font-size: 14px; line-height: 1.6;">${transcript}</div>
                        </div>
                        <div style="padding: 12px; background: rgba(124,58,237,0.1); border-radius: 8px;">
                            <div style="font-size: 12px; color: var(--primary); margin-bottom: 8px;">✨ AI解析结果</div>
                            <div style="font-size: 14px;"><strong>类型：</strong>📚 ${record.type}</div>
                            <div style="font-size: 14px;"><strong>名称：</strong>${record.content_name}</div>
                            <div style="font-size: 14px;"><strong>描述：</strong>${record.content_desc}</div>
                            <div style="font-size: 14px;"><strong>时长：</strong>${record.duration}分钟</div>
                        </div>
                    </div>
                    <div class="confirm-buttons">
                        <button class="btn confirm-btn-cancel" onclick="cancelVoiceRecord()">取消</button>
                        <button class="btn confirm-btn-confirm" style="background: var(--warning); color: white;" onclick="editVoiceRecord()">修改</button>
                        <button class="btn confirm-btn-confirm" onclick="confirmVoiceSave()">保存</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(overlay);
            setTimeout(() => overlay.classList.add('show'), 10);
        }

        function cancelVoiceRecord() {
            document.querySelector('.confirm-modal-overlay')?.remove();
            pendingRecord = null;
            
            // 重置语音录入状态
            document.getElementById('transcript-result').style.display = 'none';
            document.getElementById('record-status').textContent = '点击开始录音';
        }

        function editVoiceRecord() {
            if (!pendingRecord) return;
            
            // 填充到表单
            document.getElementById('record-type').value = pendingRecord.type;
            document.getElementById('content-name').value = pendingRecord.content_name;
            document.getElementById('content-desc').value = pendingRecord.content_desc;
            document.getElementById('duration').value = pendingRecord.duration;
            
            // 关闭弹窗
            document.querySelector('.confirm-modal-overlay')?.remove();
            
            // 切换到手动录入tab
            document.querySelector('.tab[data-tab="manual"]').click();
            
            Utils.showToast('已填充到表单，可修改后提交', 'info');
        }

        async function confirmVoiceSave() {
            if (!pendingRecord) return;
            
            const today = Utils.getToday();
            await Storage.saveRecord(today, pendingRecord);

            // 关闭弹窗
            document.querySelector('.confirm-modal-overlay')?.remove();
            pendingRecord = null;

            // 重置语音录入状态
            document.getElementById('transcript-result').style.display = 'none';
            document.getElementById('record-status').textContent = '点击开始录音';

            Utils.showToast('✅ 已保存', 'success');
            loadTodayRecords();
        }
    </script>
</body>
</html>
