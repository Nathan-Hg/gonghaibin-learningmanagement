<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库 - 主子的学习管理平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <button class="back-btn" onclick="Router.go('home')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <img src="../assets/coze-logo.svg" alt="扣子" style="width: 32px; height: 36px;">
                <span class="header-title">知识库</span>
            </div>
        </header>

        <nav class="bottom-nav">
            <a class="nav-item" href="#home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                </svg>
                <span>首页</span>
            </a>
            <a class="nav-item" href="#record">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>录入</span>
            </a>
            <a class="nav-item" href="#calendar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                </svg>
                <span>日历</span>
            </a>
            <a class="nav-item" href="#task">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                </svg>
                <span>任务</span>
            </a>
            <a class="nav-item" href="#archive">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                <span>档案</span>
            </a>
        </nav>

        <main class="app-main">
            <div class="page-header">
                <div class="page-title">知识库</div>
                <div class="page-subtitle">整理知识体系，构建学习地图</div>
            </div>

            <div class="card mb-4">
                <div class="flex items-center justify-between">
                    <span class="font-medium">我的知识库</span>
                    <button class="btn btn-sm btn-outline" onclick="showAddKnowledgeModal()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        新建
                    </button>
                </div>
            </div>

            <div id="knowledge-list">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </main>
    </div>

    <!-- 新建知识库弹层 -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">新建知识库</div>
            </div>
            <div class="modal-body">
                <div class="form-item">
                    <label class="form-label">知识库名称</label>
                    <input type="text" class="form-input" id="kb-name" placeholder="请输入名称，如：《认知觉醒》">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="addKnowledge()">创建</button>
            </div>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/router.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态
            if (!Storage.isLoggedIn()) {
                window.location.href = '../index.html';
                return;
            }
            
            loadKnowledge();
        });

        async function loadKnowledge() {
            const container = document.getElementById('knowledge-list');

            // 模拟知识库数据
            const mockKnowledge = [
                {
                    name: '认知觉醒',
                    content: `## 第一章：大脑的原理
- 本能脑：约3.6亿年前演化，基于本能
- 情绪脑：约2亿年前演化，负责情绪
- 理智脑：约250万年前演化，人类独有

## 第二章：潜意识
- 模糊的类型：认知模糊、情绪模糊、行动模糊
- 消除模糊：学习知识、保持清醒、详细审视
- 熔断机制：发现模糊时立即叫停

## 第三章：元认知
- 定义：对自身思考过程的认知和理解
- 作用：及时修正错误思维
- 训练方法：每日冥想、反思日记`
                },
                {
                    name: 'Python基础',
                    content: `## 数据类型
- 整数(int)、浮点数(float)、字符串(str)
- 列表(list)、元组(tuple)、字典(dict)、集合(set)

## 控制流
- if/elif/else 条件判断
- for/while 循环
- break/continue 语句

## 函数
- def 定义函数
- 参数默认值
- *args, **kwargs`
                }
            ];

            if (mockKnowledge.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                            </svg>
                        </div>
                        <div class="empty-title">知识库为空</div>
                        <div class="empty-desc">点击"新建"开始构建你的知识体系</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = mockKnowledge.map(item => `
                <div class="card mb-4">
                    <div class="knowledge-item-title font-semibold" onclick="toggleKnowledge(this)">
                        📖 ${item.name}
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition: transform 0.2s;">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                    <div class="knowledge-item-content" style="display: none;">
                        <pre style="white-space: pre-wrap; font-family: inherit; font-size: 13px; line-height: 1.8; color: var(--text-secondary);">${item.content}</pre>
                    </div>
                </div>
            `).join('');
        }

        function toggleKnowledge(header) {
            const content = header.nextElementSibling;
            const icon = header.querySelector('svg');
            const isHidden = content.style.display === 'none';

            content.style.display = isHidden ? 'block' : 'none';
            icon.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function showAddKnowledgeModal() {
            document.getElementById('add-modal').classList.add('active');
            document.getElementById('kb-name').focus();
        }

        function closeModal() {
            document.getElementById('add-modal').classList.remove('active');
            document.getElementById('kb-name').value = '';
        }

        async function addKnowledge() {
            const name = document.getElementById('kb-name').value.trim();
            if (!name) {
                Utils.showToast('请输入知识库名称', 'error');
                return;
            }

            closeModal();
            Utils.showToast('知识库创建成功', 'success');
            loadKnowledge();
        }

        // 点击遮罩关闭弹层
        document.getElementById('add-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
