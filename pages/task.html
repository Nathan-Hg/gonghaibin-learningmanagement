<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务 - 主子的学习管理平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <button class="back-btn" onclick="Router.go('home')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <img src="../assets/coze-logo.svg" alt="扣子" style="width: 32px; height: 36px;">
                <span class="header-title">复习任务</span>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <div class="user-avatar">U</div>
                </div>
            </div>
        </header>

        <nav class="bottom-nav">
            <a class="nav-item" href="#home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                </svg>
                <span>首页</span>
            </a>
            <a class="nav-item" href="#record">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>录入</span>
            </a>
            <a class="nav-item" href="#calendar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                </svg>
                <span>日历</span>
            </a>
            <a class="nav-item active" href="#task">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                </svg>
                <span>任务</span>
            </a>
            <a class="nav-item" href="#archive">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                <span>档案</span>
            </a>
        </nav>

        <main class="app-main">
            <div class="page-header">
                <div class="page-title">复习任务</div>
                <div class="page-subtitle">按时复习，事半功倍</div>
            </div>

            <!-- 任务统计 -->
            <div class="stats-grid mb-6">
                <div class="stat-card">
                    <div class="stat-value" id="pending-count">2</div>
                    <div class="stat-label">待完成</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="completed-count">1</div>
                    <div class="stat-label">已完成</div>
                </div>
            </div>

            <!-- 任务列表 -->
            <div id="task-list">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </main>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/router.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态
            if (!Storage.isLoggedIn()) {
                window.location.href = '../index.html';
                return;
            }
            
            loadTasks();
        });

        async function loadTasks() {
            const container = document.getElementById('task-list');

            // 模拟任务数据
            const mockTasks = [
                { id: 'task_1', title: '复习《认知觉醒》第一章', source: '图书', dueDate: Utils.getToday(), status: 'pending', desc: '大脑的原理与本能脑、情绪脑、理智脑' },
                { id: 'task_2', title: '复习《Python编程》基础语法', source: '视频', dueDate: Utils.getRelativeDate(-1), status: 'pending', desc: '数据类型、变量、运算符' },
                { id: 'task_3', title: '完成本周学习总结', source: '综合', dueDate: Utils.getRelativeDate(-3), status: 'completed', desc: '整理本周学习内容' }
            ];

            if (mockTasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                        </div>
                        <div class="empty-title">暂无任务</div>
                        <div class="empty-desc">完成学习录入后会自动生成复习任务</div>
                    </div>
                `;
                return;
            }

            // 更新统计
            const pending = mockTasks.filter(t => t.status === 'pending').length;
            const completed = mockTasks.filter(t => t.status === 'completed').length;
            document.getElementById('pending-count').textContent = pending;
            document.getElementById('completed-count').textContent = completed;

            container.innerHTML = `
                <div class="card mb-4">
                    <div class="font-medium mb-4">待完成任务</div>
                    ${mockTasks.filter(t => t.status === 'pending').map(task => `
                        <div class="task-item">
                            <div class="task-checkbox" onclick="toggleTask('${task.id}')"></div>
                            <div class="task-content">
                                <div class="task-title">${task.title}</div>
                                <div class="task-meta">${task.source} · ${task.desc}</div>
                            </div>
                            <div class="task-actions">
                                <button class="btn btn-sm btn-outline" onclick="postponeTask('${task.id}')">延期</button>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <div class="card">
                    <div class="font-medium mb-4">已完成</div>
                    ${mockTasks.filter(t => t.status === 'completed').map(task => `
                        <div class="task-item">
                            <div class="task-checkbox checked" onclick="toggleTask('${task.id}')"></div>
                            <div class="task-content">
                                <div class="task-title text-muted" style="text-decoration: line-through;">${task.title}</div>
                                <div class="task-meta">${task.source}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function toggleTask(taskId) {
            const confirmed = await Utils.showConfirm('完成任务', '确认完成此任务？');
            if (confirmed) {
                Utils.showToast('任务已完成 ✓', 'success');
                loadTasks();
            }
        }

        async function postponeTask(taskId) {
            const confirmed = await Utils.showConfirm('延期任务', '确认将此任务延期一天？');
            if (confirmed) {
                Utils.showToast('任务已延期', 'success');
                loadTasks();
            }
        }
    </script>
</body>
</html>
